<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <title>CNS圖號練習題庫 v1.3</title>
    <style>
        :root {
            --accent: #2980b9;
            --mask-color: #bdc3c7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 12px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 1.2rem;
        }

        .subtitle {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 4px;
        }

        .controls {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            background: #fafafa;
            position: sticky;
            top: 52px;
            z-index: 99;
        }

        .search-box {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
        }

        .filter-scroll {
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding-bottom: 4px;
        }

        .filter-scroll::-webkit-scrollbar {
            display: none;
        }

        .filter-group {
            display: inline-flex;
            gap: 6px;
        }

        .btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }

        .btn-toggle {
            background: #e67e22;
            color: white;
            border: none;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 8px;
            flex: 1;
            align-content: start;
        }

        .quiz-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            cursor: pointer;
        }

        .card-header {
            background: #ecf0f1;
            padding: 4px 6px;
            font-size: 0.65rem;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .star-btn {
            font-size: 1rem;
            color: #bdc3c7;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .star-btn.active {
            color: #f1c40f;
        }

        .card-body {
            padding: 8px;
            text-align: center;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .card-body img {
            max-width: 100%;
            max-height: 40px;
            object-fit: contain;
        }

        .card-body .text-symbol {
            font-size: 1rem;
            font-weight: bold;
            color: var(--accent);
        }

        .card-answer {
            padding: 8px 4px;
            background: var(--mask-color);
            color: transparent;
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-card.revealed .card-answer {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }

        @media (min-width: 600px) {
            .quiz-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 400px) {
            .quiz-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

        const STORAGE_KEY = 'cns_quiz_state';
        const UNFAMILIAR_KEY = 'cns_quiz_unfamiliar';
        const grid = document.getElementById('quizGrid');
        const statsDiv = document.getElementById('stats');
        const searchInput = document.getElementById('searchInput');
        const buttons = document.querySelectorAll('.filter-group .btn:not(.btn-toggle)');

        function loadUnfamiliar() {
            try {
                const saved = localStorage.getItem(UNFAMILIAR_KEY);
                return saved ? JSON.parse(saved) : [];
            } catch (e) {
                return [];
            }
        }

        function saveUnfamiliar() {
            try {
                localStorage.setItem(UNFAMILIAR_KEY, JSON.stringify(unfamiliarList));
            } catch (e) { }
        }

        // 從 localStorage 讀取上次的狀態
        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    return JSON.parse(saved);
                }
            } catch (e) {
                console.log('無法讀取儲存狀態');
            }
            return { filter: 'all' };
        }

        // 儲存狀態到 localStorage
        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    filter: currentFilter
                }));
            } catch (e) {
                console.log('無法儲存狀態');
            }
        }

        const savedState = loadState();
        let currentFilter = savedState.filter;
        let isAllRevealed = false;
        let unfamiliarList = loadUnfamiliar();

        // 初始化時設定正確的 active 按鈕
        buttons.forEach(btn => {
            if (btn.dataset.filter === currentFilter) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        function getCatName(code) {
            const map = {
                'CNS': 'CNS圖號', 'ARCH': '建築符號', 'STRUCT': '結構符號',
                'MAT': '構造材質', 'E': '電氣設備', 'P': '給排水',
                'M': '空調機械', 'T': '電信弱電', 'FIRE': '消防設備'
            };
            return map[code] || code;
        }

        window.toggleUnfamiliar = function (e, itemId) {
            e.stopPropagation();
            const index = unfamiliarList.indexOf(itemId);
            if (index > -1) {
                unfamiliarList.splice(index, 1);
                e.target.classList.remove('active');
            } else {
                unfamiliarList.push(itemId);
                e.target.classList.add('active');
            }
            saveUnfamiliar();
            // 若目前在「不熟」篩選模式且取消打星，為兼顧使用者體驗，不立刻重繪以免卡片瞬間消失
        };

        function renderQuiz() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const filtered = db.filter(item => {
                const itemId = item.c + '|' + (item.q || item.img) + '|' + item.a;

                let matchFilter = false;
                if (currentFilter === 'all') {
                    matchFilter = true;
                } else if (currentFilter === 'unfamiliar') {
                    matchFilter = unfamiliarList.includes(itemId);
                } else {
                    matchFilter = item.c === currentFilter;
                }

                const matchSearch = item.a.toLowerCase().includes(searchTerm) ||
                    item.d.toLowerCase().includes(searchTerm) ||
                    (item.q && item.q.toLowerCase().includes(searchTerm));
                return matchFilter && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#999;">沒有找到相符的資料</div>';
            } else {
                grid.innerHTML = filtered.map(item => {
                    const itemId = item.c + '|' + (item.q || item.img) + '|' + item.a;
                    const isUnfamiliar = unfamiliarList.includes(itemId);
                    return `
            <div class="quiz-card ${isAllRevealed ? 'revealed' : ''}" onclick="this.classList.toggle('revealed')">
                <div class="card-header">
                    <span>${getCatName(item.c)} - ${item.d}</span>
                    <span class="star-btn ${isUnfamiliar ? 'active' : ''}" onclick="toggleUnfamiliar(event, '${itemId}')">★</span>
                </div>
                <div class="card-body">
                    ${item.img ? `<img src="img_CNS/${item.img}" alt="符號">` : `<span class="text-symbol">${item.q || ''}</span>`}
                </div>
                <div class="card-answer">${item.a}</div>
            </div>
        `}).join('');
            }
            statsDiv.textContent = `共 ${db.length} 題 / 顯示 ${filtered.length} 題`;
        }

        window.toggleAll = function () {
            isAllRevealed = !isAllRevealed;
            document.querySelectorAll('.quiz-card').forEach(c =>
                isAllRevealed ? c.classList.add('revealed') : c.classList.remove('revealed'));
        };

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                saveState();  // 儲存狀態
                renderQuiz();
            });
        });

        searchInput.addEventListener('input', renderQuiz);
        renderQuiz();
    </script>
